name: Collecte temps d'attente DLP

on:
  schedule:
    - cron: '30-59/5 6 * * *'
    - cron: '*/5 7-20 * * *'
    - cron: '0-55/5 21 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests

      - name: Lancer la collecte
        run: python collect.py

      - name: Sauvegarder les données dans le dépôt
        run: |
          git config user.name "DLP Bot"
          git config user.email "dlp-bot@github-actions"
          # Récupérer les derniers changements d'abord
          git pull --rebase origin main
          # Puis ajouter et committer
          git add data/wait_times.csv
          git diff --staged --quiet || git commit -m "Data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
