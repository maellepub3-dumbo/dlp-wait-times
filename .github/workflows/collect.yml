name: Collecte temps d'attente DLP

on:
  schedule:
    - cron: '30-59/5 6 * * *'
    - cron: '*/5 7-20 * * *'
    - cron: '0-55/5 21 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Installer Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests

      - name: Lancer la collecte
        run: python collect.py

      - name: Sauvegarder les données dans le dépôt
        run: |
          git config user.name "DLP Bot"
          git config user.email "dlp-bot@github-actions"

          # Sauvegarder les nouvelles lignes collectées dans un fichier temporaire
          cp data/wait_times.csv /tmp/new_data.csv

          # Récupérer la dernière version du dépôt (sans toucher au CSV local)
          git fetch origin main
          git reset --hard origin/main

          # Réappliquer les nouvelles lignes par-dessus (en évitant les doublons)
          # On compare les deux fichiers et on garde les lignes nouvelles uniquement
          if [ -f data/wait_times.csv ]; then
            # Ajouter uniquement les lignes absentes du fichier distant
            comm -23 <(sort /tmp/new_data.csv) <(sort data/wait_times.csv) >> data/wait_times.csv
          else
            cp /tmp/new_data.csv data/wait_times.csv
          fi

          # Committer et pousser
          git add data/wait_times.csv
          git diff --staged --quiet || git commit -m "Data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
