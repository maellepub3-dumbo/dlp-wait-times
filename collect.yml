name: Collecte temps d'attente DLP

on:
  schedule:
    # Toutes les 5 minutes — GitHub Actions ne permet pas moins de 5 min
    # Plage souhaitée : 8h30-23h heure de Paris (UTC+2 en été / UTC+1 en hiver)
    # En été  (UTC+2) : 6h30-21h UTC → on couvre 6h-21h UTC pour être sûr
    # En hiver (UTC+1) : 7h30-22h UTC → couvert par la même plage
    - cron: '30-59/5 6 * * *'   # 6h30 à 6h55 UTC
    - cron: '*/5 7-20 * * *'    # 7h00 à 20h55 UTC
    - cron: '0-55/5 21 * * *'   # 21h00 à 21h55 UTC

  # Permet aussi de lancer manuellement depuis l'interface GitHub
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    # Permissions nécessaires pour que le script puisse committer le CSV
    permissions:
      contents: write

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          # Récupère tout l'historique pour éviter les conflits de merge
          fetch-depth: 0

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer les dépendances
        run: pip install requests

      - name: Lancer la collecte
        run: python collect.py

      - name: Sauvegarder les données dans le dépôt
        run: |
          git config user.name "DLP Bot"
          git config user.email "dlp-bot@github-actions"
          git add data/wait_times.csv
          # Ne committe que s'il y a des changements
          git diff --staged --quiet || git commit -m "Data: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
